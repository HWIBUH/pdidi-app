services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: ./pdidi-frontend
    env_file:
      - ./pdidi-frontend/.env
    ports:
      - 5173:5173
    volumes:
      - ./pdidi-frontend:/usr/src/app
      - /usr/src/app/node_modules

  server:
    build:
      context: ./pdidi-backend
    restart: unless-stopped
    env_file:
      - ./pdidi-backend/.env
    environment:
      DB_HOST: db
    ports:
      - 3000:3000
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./pdidi-backend:/usr/src/app
      - /usr/src/app/node_modules

volumes:
  db_data: